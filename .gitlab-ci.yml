

allure-report:
  stage: report
  image: mcr.microsoft.com/playwright:v1.57.0-jammy
  dependencies:
    - playwright-tests
  before_script:
    - apt-get update && apt-get install -y openjdk-11-jdk
    - export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    - export PATH=$JAVA_HOME/bin:$PATH
  script:
    - mkdir -p allure-results
    # Auto-generate environment
    - cat <<EOF > allure-results/environment.properties
      Environment=$ENV
      Browser=Chrome
      Browser.Version=latest
      OS=Ubuntu 22.04
      EOF
    # Auto-generate categories
    - cat <<EOF > allure-results/categories.json
      [
        {"name": "Critical", "matchedStatuses": ["failed"]},
        {"name": "Minor", "matchedStatuses": ["broken"]}
      ]
      EOF
    # Auto-generate executor info
    - cat <<EOF > allure-results/executor.json
      {
        "name": "GitLab CI",
        "type": "gitlabci",
        "url": "$CI_PROJECT_URL",
        "buildOrder": $CI_PIPELINE_IID,
        "buildName": "Pipeline #$CI_PIPELINE_IID",
        "reportUrl": "$CI_JOB_URL"
      }
      EOF
    # Generate Allure report with history
    - mkdir -p allure-report
    - npx allure generate allure-results --clean -o allure-report --history allure-report/history || echo "No previous history"
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 2 weeks
  cache:
    key: allure-history
    paths:
      - allure-report/history/
